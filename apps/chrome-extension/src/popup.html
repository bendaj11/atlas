<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Atlas versions</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="title"><strong>Atlas versions</strong><span id="host-name">Detecting host...</span></div>
    <button id="refresh" class="icon-button" type="button" title="Refresh host data" aria-label="Refresh host data">&#x21bb;</button>
  </header>
  <main>
    <div id="status" role="status" aria-live="polite"><span class="status-spinner" aria-hidden="true"></span><span id="status-text">Reading the active Atlas host...</span></div>
    <fieldset class="scope">
      <legend>Apply overrides to</legend>
      <label><input type="radio" name="scope" value="all" checked><span>All tabs</span></label>
      <label><input type="radio" name="scope" value="tab"><span>This tab</span></label>
    </fieldset>
    <section id="versions" aria-label="App versions"></section>
    <details id="local-panel">
      <summary>Use a local manifest</summary>
      <label>App<select id="local-app"></select></label>
      <label>Manifest or atlas dev URL<input id="local-url" type="url" placeholder="http://localhost:4400/atlas.local-overrides.json"></label>
      <button id="add-local" type="button">Use local version</button>
    </details>
  </main>
  <footer><button id="clear" type="button">Use production</button><button id="apply" type="button">Apply and reload</button></footer>
  <script type="module" src="popup.js"></script>
</body>
</html>
