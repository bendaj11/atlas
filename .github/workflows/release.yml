name: Release bundle

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-release-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-release-${{ runner.os }}-
      - run: pnpm run ci:full
      - run: pnpm run test:generated
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run test:e2e
      - run: pnpm run release:bundle
      - uses: actions/upload-artifact@v4
        with:
          name: atlas-${{ github.ref_name }}
          path: dist/release
          if-no-files-found: error
          retention-days: 90

  github-release:
    if: github.ref_type == 'tag'
    needs: bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: atlas-${{ github.ref_name }}
          path: dist/release
      - run: cd dist/release && sha256sum --check SHA256SUMS
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/release/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/release/* --verify-tag --generate-notes --title "Atlas ${GITHUB_REF_NAME}"
          fi
