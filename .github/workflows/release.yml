name: Release bundle

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.4
      - run: yarn install --frozen-lockfile
      - run: yarn typecheck
      - run: yarn check:unused
      - run: yarn test
      - run: yarn test:generated
      - run: yarn playwright install --with-deps chromium
      - run: yarn test:e2e
      - run: yarn release:bundle
      - uses: actions/upload-artifact@v4
        with:
          name: atlas-${{ github.ref_name }}
          path: dist/release
          if-no-files-found: error
          retention-days: 90

  github-release:
    if: github.ref_type == 'tag'
    needs: bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: atlas-${{ github.ref_name }}
          path: dist/release
      - run: cd dist/release && sha256sum --check SHA256SUMS
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/release/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/release/* --verify-tag --generate-notes --title "Atlas ${GITHUB_REF_NAME}"
          fi
