name: Verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      heavy: ${{ steps.filter.outputs.heavy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "heavy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$BASE_SHA" "$GITHUB_SHA")"
          if echo "$changed_files" | grep -Eq '^(apps|examples|packages|scripts|tests)/|^(\.github/workflows/|package.json|yarn.lock|turbo.json|tsconfig.json|playwright.config.ts)'; then
            echo "heavy=true" >> "$GITHUB_OUTPUT"
          else
            echo "heavy=false" >> "$GITHUB_OUTPUT"
          fi

  quality:
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-quality-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-quality-${{ runner.os }}-
      - if: github.event_name == 'pull_request' && needs.changes.outputs.heavy == 'true'
        run: yarn ci:affected
      - if: github.event_name == 'push'
        run: yarn ci:full

  package-artifacts:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.heavy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-packages-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-packages-${{ runner.os }}-
      - run: yarn pack:verify
      - uses: actions/upload-artifact@v4
        with:
          name: atlas-package-verification-${{ github.run_id }}
          path: dist/package-verification
          if-no-files-found: error
          retention-days: 1

  generated-projects:
    needs: [changes, package-artifacts]
    if: github.event_name == 'push' || needs.changes.outputs.heavy == 'true'
    strategy:
      fail-fast: false
      matrix:
        package-manager: [yarn, pnpm]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - if: matrix.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.4
      - uses: actions/download-artifact@v4
        with:
          name: atlas-package-verification-${{ github.run_id }}
          path: dist/package-verification
      - run: node scripts/verify-generated-projects.js --package-manager=${{ matrix.package-manager }}

  e2e:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.heavy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
      - run: yarn playwright install --with-deps chromium
      - run: yarn test:e2e
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  release-bundle:
    if: github.event_name == 'push'
    needs: [quality, package-artifacts, generated-projects, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/download-artifact@v4
        with:
          name: atlas-package-verification-${{ github.run_id }}
          path: dist/package-verification
      - run: node scripts/create-release-bundle.js
      - uses: actions/upload-artifact@v4
        with:
          name: atlas-main-${{ github.run_id }}
          path: dist/release
          if-no-files-found: error
          retention-days: 30
