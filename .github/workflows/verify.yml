name: Verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn typecheck
      - run: yarn check:unused
      - run: yarn test

  package-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn pack:verify
      - uses: actions/upload-artifact@v4
        with:
          name: atlas-package-verification-${{ github.run_id }}
          path: dist/package-verification
          if-no-files-found: error
          retention-days: 1

  generated-projects:
    needs: package-artifacts
    strategy:
      fail-fast: false
      matrix:
        package-manager: [yarn, pnpm]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - if: matrix.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.4
      - uses: actions/download-artifact@v4
        with:
          name: atlas-package-verification-${{ github.run_id }}
          path: dist/package-verification
      - run: node scripts/verify-generated-projects.mjs --package-manager=${{ matrix.package-manager }}

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
      - run: yarn playwright install --with-deps chromium
      - run: yarn test:e2e
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  release-bundle:
    if: github.event_name == 'push'
    needs: [quality, package-artifacts, generated-projects, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/download-artifact@v4
        with:
          name: atlas-package-verification-${{ github.run_id }}
          path: dist/package-verification
      - run: node scripts/create-release-bundle.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: atlas-main-${{ github.run_id }}
          path: dist/release
          if-no-files-found: error
          retention-days: 30

  publish-packages:
    if: github.event_name == 'push'
    needs: release-bundle
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: atlas-main-${{ github.run_id }}
          path: dist/release
      - run: cd dist/release && sha256sum --check SHA256SUMS
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Publish unpublished Atlas packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          version=$(node -p "require('./dist/release/release.json').version")
          for package in contracts sdk runtime generators testkit cli; do
            if npm view "@atlas/${package}@${version}" version >/dev/null 2>&1; then
              echo "@atlas/${package}@${version} is already published; skipping."
            else
              npm publish "dist/release/${package}.tgz" --access public --provenance
            fi
          done
